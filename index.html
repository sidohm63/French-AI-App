<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية الفرنسية الذكية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --blue: #002395; --gold: #ffc107; }
        body { background: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; padding-bottom: 50px; }
        .navbar { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .ai-card { background: white; border-radius: 15px; border: 2px solid var(--blue); padding: 20px; margin-top: 20px; }
        #aiResponse { display: none; background: #eef2f7; padding: 15px; border-radius: 10px; margin-top: 15px; border-right: 4px solid var(--blue); }
        .level-circle { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #ddd; display: flex; align-items: center; justify-content: center; margin: auto; font-weight: bold; background: white; }
        .active .level-circle { border-color: var(--blue); color: var(--blue); cursor: pointer; }
    </style>
</head>
<body>

<nav class="navbar navbar-light px-3">
    <span class="fw-bold text-primary"><i class="fas fa-graduation-cap"></i> أكاديمية الفرنسية</span>
    <span class="badge bg-warning text-dark p-2">⭐ النقاط: <span id="pts">0</span></span>
</nav>

<div class="container mt-4">
    <div class="row text-center mb-4" id="map"></div>

    <div class="ai-card shadow-sm">
        <h6 class="fw-bold"><i class="fas fa-robot"></i> المصحح الذكي</h6>
        <textarea id="userInput" class="form-control my-3" rows="3" placeholder="اكتب جملة فرنسية هنا..."></textarea>
        <button onclick="askAI()" id="sendBtn" class="btn btn-primary w-100 fw-bold">تحقق الآن</button>
        <div id="aiResponse"></div>
    </div>
</div>

<script>
    // مفتاحك من الصورة
    const KEY = "AIzaSyBvhL9zztNtfn7GCJSMisqqQSvKp6Ln30Y";
    // الرابط المحدث لنسخة v1 لضمان التوافق
    const BASE_URL = "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent";

    let points = parseInt(localStorage.getItem('pts')) || 0;

    function updateUI() {
        document.getElementById('pts').innerText = points;
        const map = document.getElementById('map');
        map.innerHTML = `
            <div class="col active" onclick="alert('سؤال ذكي قادم...')">
                <div class="level-circle">1</div>
                <div class="small mt-1">المستوى 1</div>
            </div>
            <div class="col ${points < 50 ? 'text-muted opacity-50' : 'active'}">
                <div class="level-circle">${points < 50 ? '🔒' : '2'}</div>
                <div class="small mt-1">المستوى 2</div>
            </div>
        `;
    }

    async function askAI() {
        const txt = document.getElementById('userInput').value;
        if(!txt) return;
        
        const btn = document.getElementById('sendBtn');
        const res = document.getElementById('aiResponse');
        
        btn.disabled = true;
        res.style.display = 'block';
        res.innerText = "جاري الاتصال بذكاء جوجل...";

        try {
            const response = await fetch(`${BASE_URL}?key=${KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Correct this French: "${txt}". Explain in Arabic.` }] }]
                })
            });

            const data = await response.json();
            
            if(data.error) {
                Swal.fire('خطأ تقني', data.error.message, 'error');
                res.style.display = 'none';
            } else {
                res.innerText = data.candidates[0].content.parts[0].text;
                points += 10;
                localStorage.setItem('pts', points);
                updateUI();
                Swal.fire('أحسنت!', 'حصلت على 10 نقاط', 'success');
            }
        } catch (e) {
            Swal.fire('خطأ اتصال', 'تأكد من الإنترنت', 'error');
        } finally {
            btn.disabled = false;
        }
    }

    updateUI();
</script>
</body>
</html>
